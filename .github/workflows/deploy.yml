name: CI/CD — Build, Push & Deploy Backend

# ✔ Se activa solo con push a la rama 'deploy'
on:
  push:
    branches:
      - deploy

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Build y Push — API Ventas
  # ─────────────────────────────────────────────
  build-ventas:
    name: Build & Push — API Ventas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push imagen Ventas
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          dockerfile: ./back-Ventas_SpringBoot/Springboot-API-REST/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/innovatech-ventas:latest

  # ─────────────────────────────────────────────
  # JOB 2: Build y Push — API Despachos
  # ─────────────────────────────────────────────
  build-despachos:
    name: Build & Push — API Despachos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push imagen Despachos
        uses: docker/build-push-action@v5
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          dockerfile: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/innovatech-despachos:latest

  # ─────────────────────────────────────────────
  # JOB 3: Deploy en EC2 (espera que ambos builds terminen)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy en EC2
    runs-on: ubuntu-latest
    needs: [build-ventas, build-despachos]  # Solo despliega si ambos builds pasaron

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy via SSH a EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Ir al directorio del proyecto en EC2
            cd ~/Innovatech_Backend

            # Apuntar al fork correcto
            git remote set-url origin https://github.com/MatiDroid21/Innovatech_Backend.git

            # Actualizar el código
            git pull origin deploy

            # Crear .env
            cat > .env <<EOF
            DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            EOF

            # Bajar y volver a levantar los servicios con las nuevas imágenes
            docker compose pull
            docker compose up -d --remove-orphans

            # Limpiar imágenes antiguas
            docker image prune -f
